<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phòng thi thử — Trắc nghiệm Tin học Nâng cao (HUIT)</title>
<style>
  :root{
    --pp:#2b579a; --pp-dark:#1e3c6e; --pp-light:#eaf1fb;
    --ink:#1b2430; --muted:#6b7686; --line:#e6eaf0; --bg:#eef2f7;
    --ok:#0f9d58; --okbg:#e7f7ef; --bad:#d6332e; --badbg:#fdecec;
    --warn:#c07a0c; --warnbg:#fff7e8; --cur:#f0a500;
    --grad:linear-gradient(135deg,#2f63ad 0%,#244d8a 55%,#1b3a6b 100%);
    --grad-ok:linear-gradient(135deg,#15b364 0%,#0f9d58 100%);
    --shadow-sm:0 1px 2px rgba(16,30,54,.06),0 1px 3px rgba(16,30,54,.05);
    --shadow-md:0 6px 18px rgba(16,30,54,.08),0 2px 6px rgba(16,30,54,.05);
    --shadow-lg:0 18px 50px rgba(16,30,54,.18);
  }
  *{box-sizing:border-box}
  button,select,input,textarea{font-family:inherit}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,system-ui,"Helvetica Neue",Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1100px 480px at 78% -8%,#e3ecfa 0%,rgba(227,236,250,0) 60%),
               radial-gradient(900px 420px at 8% 4%,#eaf3ee 0%,rgba(234,243,238,0) 55%),var(--bg);
    line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  /* ===== Top bar ===== */
  .topbar{background:var(--grad);color:#fff;padding:13px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    box-shadow:0 4px 18px rgba(27,58,107,.28);position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(255,255,255,.12)}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand .mark{flex:0 0 auto;width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
    display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .topbar h1{font-size:16.5px;margin:0;font-weight:700;letter-spacing:.2px;line-height:1.25}
  .topbar .sub{font-size:12px;opacity:.82;letter-spacing:.2px}
  .topbar .spacer{flex:1}
  .examsel{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.34);border-radius:9px;padding:8px 12px;font-size:13.5px;font-weight:600;cursor:pointer;outline:none}
  .examsel:hover{background:rgba(255,255,255,.22)}
  .examsel option{color:#1b2430}
  .timer{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.38);border-radius:10px;padding:7px 15px;font-size:16px;font-weight:800;
    font-variant-numeric:tabular-nums;font-family:"SF Mono",Consolas,monospace;letter-spacing:1px;box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
  .timer.low{background:var(--bad);border-color:#ff8f8a;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.5}}
  /* ===== Layout ===== */
  .wrap{display:flex;gap:20px;max-width:1180px;margin:22px auto;padding:0 18px;align-items:flex-start}
  /* ===== Nav panel ===== */
  aside{position:sticky;top:82px;flex:0 0 224px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm)}
  aside h3{margin:0 0 12px;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.09em;font-weight:700}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .qbtn{aspect-ratio:1;border:1px solid #d8dee9;background:#f5f7fb;border-radius:9px;font-size:13px;font-weight:700;color:#54607a;cursor:pointer;
    display:flex;align-items:center;justify-content:center;padding:0;transition:transform .08s,box-shadow .12s,background .12s,border-color .12s}
  .qbtn:hover{border-color:var(--pp);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .qbtn.answered{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 2px 6px rgba(43,87,154,.35)}
  .qbtn.current{outline:3px solid var(--cur);outline-offset:1px}
  .qbtn.correct{background:var(--grad-ok);color:#fff;border-color:transparent}
  .qbtn.wrong{background:linear-gradient(135deg,#e2453f,#c52a25);color:#fff;border-color:transparent}
  .legend{margin-top:14px;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:6px}
  .legend span{display:flex;align-items:center;gap:8px}
  .dot{width:14px;height:14px;border-radius:5px;display:inline-block;border:1px solid #d2d9e4;background:#f5f7fb}
  .submitbtn{width:100%;margin-top:16px;background:var(--grad-ok);color:#fff;border:none;border-radius:11px;padding:12px;font-size:15px;font-weight:700;
    cursor:pointer;box-shadow:0 4px 14px rgba(15,157,88,.32);transition:transform .08s,box-shadow .12s}
  .submitbtn:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(15,157,88,.4)}
  .progress{margin-top:12px;font-size:12.5px;color:var(--muted);text-align:center;font-weight:600}
  /* ===== Main ===== */
  main{flex:1;min-width:0}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 30px;box-shadow:var(--shadow-md)}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .qnum{background:var(--grad);color:#fff;border-radius:9px;padding:4px 13px;font-weight:700;font-size:13.5px;box-shadow:0 2px 6px rgba(43,87,154,.3)}
  /* module chips */
  .qmod,.chip{display:inline-flex;align-items:center;font-size:12px;font-weight:700;border-radius:999px;padding:4px 12px;letter-spacing:.2px}
  .m-excel{background:#e7f7ef;color:#0f7a45} .m-project{background:#fff2e0;color:#b45309}
  .m-ppt{background:#fdeae0;color:#c2410c} .m-word{background:#e8f0fe;color:#1d4ed8}
  .qtext{font-size:17.5px;font-weight:700;margin:14px 0 20px;color:var(--pp-dark);line-height:1.5}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1.5px solid #dde3ec;border-radius:12px;padding:13px 16px;cursor:pointer;font-size:15px;
    transition:border-color .12s,background .12s,box-shadow .12s,transform .08s}
  .opt:hover{border-color:var(--pp);background:#f6f9ff;transform:translateY(-1px);box-shadow:var(--shadow-sm)}
  .opt.sel{border-color:var(--pp);background:var(--pp-light);box-shadow:0 0 0 3px rgba(43,87,154,.12)}
  .opt .key{font-weight:800;color:var(--pp);flex:0 0 22px}
  .opt input{margin-top:3px;accent-color:var(--pp);width:17px;height:17px}
  .navrow{display:flex;justify-content:space-between;margin-top:24px;gap:10px}
  .navrow button{background:#fff;border:1.5px solid var(--pp);color:var(--pp);border-radius:11px;padding:11px 24px;font-size:14.5px;font-weight:700;cursor:pointer;transition:.12s}
  .navrow button:hover:not(:disabled){background:var(--pp);color:#fff;box-shadow:var(--shadow-sm)}
  .navrow button:disabled{opacity:.35;cursor:default}
  /* ===== Result ===== */
  .result{background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 32px;margin-bottom:18px;box-shadow:var(--shadow-md);text-align:center}
  .scorebig{font-size:60px;font-weight:800;line-height:1;letter-spacing:-1px}
  .scorebig.pass{color:var(--ok)} .scorebig.fail{color:var(--bad)}
  .verdict{display:inline-block;font-size:16px;font-weight:800;margin:12px 0 4px;padding:7px 18px;border-radius:999px}
  .verdict.pass{color:#0f7a45;background:var(--okbg)} .verdict.fail{color:#b3271f;background:var(--badbg)}
  .statline{color:var(--muted);font-size:14.5px;margin:4px 0}
  .actions{margin-top:20px;display:flex;gap:11px;flex-wrap:wrap;justify-content:center}
  .actions button{border:none;border-radius:11px;padding:12px 22px;font-size:14.5px;font-weight:700;cursor:pointer;transition:transform .08s,box-shadow .12s}
  .btn-primary{background:var(--grad);color:#fff;box-shadow:0 4px 14px rgba(43,87,154,.3)} .btn-primary:hover{transform:translateY(-1px);box-shadow:0 7px 20px rgba(43,87,154,.4)}
  .btn-ghost{background:#eef2f7;color:#33405a;border:1px solid var(--line)!important} .btn-ghost:hover{background:#e3e9f1}
  /* review */
  .rev{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
  .rev .rh{display:flex;gap:9px;align-items:center;font-weight:700;color:var(--pp-dark);font-size:15px;margin-bottom:10px;flex-wrap:wrap}
  .rev .badge{font-size:12px;font-weight:700;border-radius:999px;padding:3px 11px;color:#fff}
  .rev .badge.ok{background:var(--ok)} .rev .badge.bad{background:var(--bad)}
  .rev .ro{font-size:14px;padding:7px 12px;border-radius:9px;margin:4px 0}
  .rev .ro.c{background:var(--okbg);border-left:4px solid var(--ok)}
  .rev .ro.w{background:var(--badbg);border-left:4px solid var(--bad)}
  .rev .ro.n{color:#566}
  .rev .expl{font-size:13.5px;color:#3a4660;background:#f4f7fb;border-radius:10px;padding:11px 13px;margin-top:10px}
  .rev .expl.flag{background:var(--warnbg);border-left:4px solid var(--warn)}
  /* review retry mode */
  .retry-head{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 20px;margin-bottom:12px;font-weight:700;color:var(--pp-dark);font-size:16px;box-shadow:var(--shadow-sm)}
  .ropt{display:block;width:100%;text-align:left;border:1.5px solid #dde3ec;border-radius:11px;padding:12px 15px;margin:7px 0;background:#fff;font-size:14.5px;cursor:pointer;font-family:inherit;color:var(--ink);line-height:1.5;transition:.12s}
  .ropt:hover:not(:disabled){border-color:var(--pp);background:#f6f9ff}
  .ropt:disabled{cursor:default}
  .ropt.correct{background:var(--okbg);border-color:var(--ok);color:#0f6a3c;font-weight:700}
  .ropt.wrong{background:var(--badbg);border-color:var(--bad);opacity:.72;text-decoration:line-through}
  .ropt b{color:var(--pp);margin-right:6px}
  .reveal{background:#eef2f7;border:1px solid var(--line);color:#475069;border-radius:10px;padding:8px 15px;font-size:13px;cursor:pointer;margin-top:9px;font-weight:600}
  .reveal:hover{background:#e3e9f1}
  /* ===== Start screen ===== */
  .start-wrap{max-width:700px;margin:42px auto;padding:0 18px}
  .startcard{background:#fff;border:1px solid var(--line);border-radius:22px;padding:42px 36px;text-align:center;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
  .startcard::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:var(--grad)}
  .start-hero{width:78px;height:78px;margin:6px auto 10px;border-radius:20px;background:var(--pp-light);display:flex;align-items:center;justify-content:center;font-size:40px;box-shadow:inset 0 0 0 1px rgba(43,87,154,.12)}
  .startcard h2{color:var(--pp-dark);margin:6px 0 6px;font-size:25px;letter-spacing:-.3px}
  .start-meta{color:var(--muted);font-size:13.5px;margin-bottom:24px}
  .start-stats{display:flex;justify-content:center;gap:14px;margin:20px 0;flex-wrap:wrap}
  .start-stats>div{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px 22px;min-width:104px;box-shadow:var(--shadow-sm);position:relative}
  .start-stats>div::before{content:"";position:absolute;top:0;left:18px;right:18px;height:3px;border-radius:0 0 3px 3px;background:var(--pp)}
  .start-stats>div:nth-child(2)::before{background:var(--cur)} .start-stats>div:nth-child(3)::before{background:var(--ok)}
  .start-stats b{display:block;font-size:28px;color:var(--pp-dark);font-weight:800;letter-spacing:-.5px}
  .start-stats span{font-size:12px;color:var(--muted);font-weight:600}
  .start-mods{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:26px}
  .startbtn{background:var(--grad-ok);color:#fff;border:none;border-radius:14px;padding:15px 44px;font-size:17px;font-weight:700;cursor:pointer;
    box-shadow:0 8px 22px rgba(15,157,88,.36);transition:transform .1s,box-shadow .15s;display:inline-flex;align-items:center;gap:9px}
  .startbtn .play{display:inline-flex;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.22);align-items:center;justify-content:center;font-size:11px}
  .startbtn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(15,157,88,.45)}
  .start-note{margin-top:20px;font-size:13px;color:#8a6516;background:var(--warnbg);border:1px solid #f3e2bd;border-radius:11px;padding:11px 15px}
  /* ===== Login ===== */
  .login-overlay{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;
    background:radial-gradient(900px 600px at 20% 15%,#3a6cb5 0%,rgba(58,108,181,0) 60%),var(--grad)}
  .login-overlay::before,.login-overlay::after{content:"";position:absolute;border-radius:50%;filter:blur(2px);opacity:.18;background:#fff}
  .login-overlay::before{width:360px;height:360px;top:-120px;right:-90px}
  .login-overlay::after{width:260px;height:260px;bottom:-110px;left:-80px;opacity:.12}
  .login-card{background:#fff;border-radius:22px;padding:38px 32px;width:100%;max-width:400px;box-shadow:0 24px 70px rgba(10,25,60,.45);text-align:center;position:relative;z-index:1}
  .login-card .logo{width:64px;height:64px;margin:0 auto 6px;border-radius:18px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 8px 20px rgba(43,87,154,.4)}
  .login-card h2{color:var(--pp-dark);margin:14px 0 4px;font-size:21px;letter-spacing:-.2px}
  .login-card p.s{color:var(--muted);font-size:13px;margin:0 0 22px}
  .login-field{text-align:left;margin-bottom:15px}
  .login-field label{display:block;font-size:12.5px;color:#3a4660;margin-bottom:6px;font-weight:700}
  .login-field input{width:100%;border:1.5px solid #dce2ec;border-radius:11px;padding:13px 15px;font-size:15px;font-family:inherit;transition:.12s;background:#fbfcfe}
  .login-field input:focus{outline:none;border-color:var(--pp);background:#fff;box-shadow:0 0 0 3px rgba(43,87,154,.13)}
  .login-btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:11px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;
    box-shadow:0 6px 18px rgba(43,87,154,.34);transition:transform .1s,box-shadow .15s}
  .login-btn:hover{transform:translateY(-1px);box-shadow:0 9px 24px rgba(43,87,154,.45)}
  .login-err{background:var(--badbg);color:var(--bad);border-radius:10px;padding:10px 13px;font-size:13.5px;margin-bottom:13px;display:none;font-weight:600}
  .login-hint{margin-top:16px;font-size:12px;color:#9aa3b2}
  /* user chip + logout */
  .userchip{display:flex;align-items:center;gap:10px;font-size:13.5px;color:#fff;font-weight:600}
  .logoutbtn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.36);border-radius:9px;padding:7px 13px;font-size:13px;cursor:pointer;transition:.12s}
  .logoutbtn:hover{background:rgba(255,255,255,.26)}
  .backbtn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.36);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s}
  .backbtn:hover{background:rgba(255,255,255,.26)}
  /* history */
  .histbox{margin-top:28px;text-align:left;border-top:1px solid var(--line);padding-top:22px}
  .histbox h3{color:var(--pp-dark);font-size:15px;margin:0 0 10px;font-weight:700}
  .histtable{width:100%;font-size:13.5px;border-collapse:separate;border-spacing:0;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .histtable th,.histtable td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:center}
  .histtable tr:last-child td{border-bottom:none}
  .histtable th{background:var(--pp-light);color:var(--pp-dark);font-weight:700}
  .histtable tbody tr:nth-child(even){background:#fafbfd}
  .hist-empty{color:var(--muted);font-size:13px;background:#f5f7fb;border-radius:10px;padding:14px;text-align:center}
  /* ===== Tabs chuyển chế độ ===== */
  .tabs{display:flex;gap:5px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:4px}
  .tab{background:transparent;color:#fff;border:none;border-radius:9px;padding:7px 15px;font-size:13.5px;font-weight:700;cursor:pointer;opacity:.85;transition:.12s}
  .tab:hover{opacity:1} .tab.active{background:#fff;color:var(--pp-dark);opacity:1;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  .ctrls{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  /* ===== Ôn tập ===== */
  .study-wrap{max-width:840px;margin:24px auto;padding:0 18px}
  .study-mods{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
  .modtab{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;color:#54607a;box-shadow:var(--shadow-sm);transition:transform .08s,border-color .12s,box-shadow .12s}
  .modtab:hover{border-color:var(--pp);transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .modtab.active{color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(43,87,154,.3)}
  .modtab.active.m-excel{background:linear-gradient(135deg,#16a35a,#0f7a45)} .modtab.active.m-project{background:linear-gradient(135deg,#d98324,#b45309)}
  .modtab.active.m-ppt{background:linear-gradient(135deg,#e0612f,#c2410c)} .modtab.active.m-word{background:linear-gradient(135deg,#2f63ad,#1d4ed8)}
  .modtab small{font-weight:600;opacity:.75;margin-left:4px}
  .study-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:28px 30px;box-shadow:var(--shadow-md)}
  .opts-study{display:flex;flex-direction:column;gap:10px;margin-top:4px}
  .sopt{border:1.5px solid #e2e7ef;border-radius:12px;padding:13px 16px;font-size:15px;background:#fbfcfe;line-height:1.5}
  .sopt.correct{border-color:var(--ok);background:var(--okbg);color:#0f6a3c;font-weight:600;box-shadow:0 0 0 3px rgba(15,157,88,.12)}
  .sopt b{color:var(--pp);margin-right:6px}
  .study-actions{margin:18px 0 6px;text-align:center}
  .reveal-big{background:var(--grad-ok);color:#fff;border:none;border-radius:12px;padding:12px 30px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 5px 14px rgba(15,157,88,.3);transition:transform .08s,box-shadow .12s}
  .reveal-big:hover{transform:translateY(-1px)}
  .reveal-big.hidden{background:#eef2f7;color:#33405a;box-shadow:none;border:1px solid var(--line)}
  .study-progress{height:6px;border-radius:999px;background:#e7ecf3;overflow:hidden;margin:2px 0 16px}
  .study-progress>i{display:block;height:100%;background:var(--grad);border-radius:999px;transition:width .25s}
  .study-empty{text-align:center;color:var(--muted);padding:34px 16px;background:#f5f7fb;border-radius:14px;line-height:1.7}
  .expl{font-size:13.7px;color:#3a4660;background:#f4f7fb;border-radius:10px;padding:11px 13px}
  .hide{display:none}
  /* Khử "sticky hover" trên thiết bị cảm ứng (tránh 1 ô bị viền xanh dù chưa chọn) */
  @media (hover:none){
    .opt:not(.sel):hover{border-color:#dde3ec;background:#fff;transform:none;box-shadow:none}
    .ropt:not(.correct):not(.wrong):hover:not(:disabled){border-color:#dde3ec;background:#fff}
    .qbtn:not(.answered):not(.current):not(.correct):not(.wrong):hover{border-color:#d8dee9;transform:none;box-shadow:none}
  }
  code{background:#eef1f6;padding:1px 6px;border-radius:5px;font-family:Consolas,monospace;font-size:.9em;color:#1e3c6e}
  @media(max-width:820px){
    .wrap{flex-direction:column}aside{position:static;width:100%;flex:none}
    .topbar{padding:11px 16px}.topbar h1{font-size:15px}.card{padding:22px 18px}
    .startcard{padding:32px 22px}.scorebig{font-size:52px}
  }
</style>
</head>
<body>

<!-- ===== MÀN HÌNH ĐĂNG NHẬP ===== -->
<div id="loginView" class="login-overlay">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="logo">🖥️</div>
    <h2>Phòng thi thử Tin học Nâng cao</h2>
    <p class="s">Đăng nhập để vào thi và lưu lịch sử điểm</p>
    <div class="login-err" id="loginErr">Sai tên đăng nhập hoặc mật khẩu.</div>
    <div class="login-field"><label>Tên đăng nhập</label><input id="inpUser" autocomplete="username" placeholder="username"></div>
    <div class="login-field"><label>Mật khẩu</label><input id="inpPass" type="password" autocomplete="current-password" placeholder="••••••"></div>
    <button class="login-btn" type="submit">Đăng nhập</button>

        a:0, e:"Nhóm Alignment (trong Table Tools→Layout) căn chỉnh dữ liệu trong ô bảng."},
      {m:"Word", q:"Trong Word 2010, muốn thiết lập lề trên, dưới, trái, phải, ta chọn:",
        o:["Page Layout\\Page Setup\\Save as Default","Page Layout\\Page Setup\\Margins","Page Layout\\Page Setup\\Pages","Page Layout\\Page Setup\\Orientation"],
        a:1, e:"Margins = thiết lập lề; Orientation là hướng giấy."},
      {m:"Word", q:"Trong Word 2010, bạn lựa chọn khu vực nào để thể hiện rằng mình muốn in 4 bản:",
        o:["File\\Print\\Settings\\Pages","File\\Print\\Print","File\\Print\\Printer","File\\Print\\Copies"],
        a:3, e:"Copies = số bản in."}
    ]
  },

  "A211PC11": {
    meta: "Đề: A211PC11 · DethiNC09082025C14002 · đợt 09/08/2025",
    minutes: 40,
    questions: [
      // ---------- EXCEL (1–10) ----------
      {m:"Excel", q:"Trong Excel 2010, chọn phát biểu đúng.",
        o:["Header chỉ áp dụng cho trang tính được chọn","Header cho phép đánh số trang bắt đầu từ số bất kỳ","Footer sử dụng đánh số trang phải bắt đầu từ số 1","Header không cho hiển thị số trang"],
        a:1, e:"Trong Page Setup → tab Page → 'First page number' cho phép bắt đầu đánh số từ số bất kỳ."},
      {m:"Excel", q:"Trong Excel 2010, để hiện ra nút tùy chỉnh dán (Paste) sau khi dán dữ liệu, ta thực hiện:",
        o:["File\\Options\\Advanced\\Show Paste Option button when content is Pasted","File\\Options\\Advanced\\Show gridlines","File\\Options\\Advanced\\Show Formula bar","File\\Options\\Advanced\\Show Insert Option Button"],
        a:0, e:"Tùy chọn 'Show Paste Options button when content is pasted' bật nút Paste Options."},
      {m:"Excel", q:"Trong Excel 2010, để đổi tên vùng ô, ta thực hiện:",
        o:["Formulas\\Name Manager\\Chọn vùng ô cần sửa\\Edit","Formulas\\Name Manager\\Chọn vùng ô cần sửa\\New","Formulas\\Name Manager\\Chọn vùng ô cần sửa\\Delete","Formulas\\Name Manager\\Chọn vùng ô cần sửa\\Filter"],
        a:0, e:"Đổi tên vùng đã đặt tên: Name Manager → chọn vùng → Edit."},
      {m:"Excel", q:"Trong Excel 2010, để chèn biểu đồ kết hợp cột và đường, ta chọn:",
        o:["Insert\\Charts\\Line","Insert\\Charts\\Combo","Insert\\Charts\\Column","Insert\\Charts\\Bar"],
        a:1, e:"Combo = biểu đồ kết hợp (cột + đường)."},
      {m:"Excel", q:"Trong Excel 2010, chọn phát biểu đúng (về liên kết / Hyperlink)?",
        o:["Liên kết Excel 2010 chỉ liên kết đến ô, vùng ô của bảng tính","Liên kết Excel 2010 chỉ liên kết đến ô giữa các bảng tính","Liên kết Excel 2010 chỉ dùng để mở các ứng dụng khác","Liên kết Excel 2010 có thể xóa tệp tin bất kỳ"],
        a:0, flag:true, e:"⚠️ Nên đối chiếu bản gốc. Hyperlink Excel trỏ tới ô/vùng ô, sheet khác, file, web, email — các phương án còn lại ('chỉ mở ứng dụng', 'xóa tệp') đều sai."},
      {m:"Excel", q:"Trong Excel 2010, sau khi thay đổi dữ liệu nguồn thì kết quả trong bảng trụ xoay (PivotTable) như thế nào?",
        o:["Nhập kết quả vào bảng trụ xoay","Bảng trụ xoay bị xóa","Tự động cập nhật kết quả","Không tự cập nhật kết quả"],
        a:3, e:"PivotTable KHÔNG tự cập nhật khi nguồn đổi — phải bấm Refresh."},
      {m:"Excel", q:"Trong Excel 2010, để sắp xếp dữ liệu theo yêu cầu, trước tiên cần:",
        o:["Chọn Data\\Sort\\Order\\Custom List","Sắp xếp dữ liệu theo thứ tự tăng dần","Data\\Sort\\Add Level","Nhập giá trị muốn dùng để sắp xếp theo thứ tự tăng dần rồi thực hiện"],
        a:0, flag:true, e:"⚠️ Nên đối chiếu bản gốc. Sắp 'theo yêu cầu' = theo danh sách tùy chỉnh → tạo Custom List trước (Order → Custom List)."},
      {m:"Excel", q:"Trong Excel 2010, để lọc dữ liệu trong vùng chọn, ta thao tác:",
        o:["Data\\Outline\\Group","Data\\Data Tools\\Data Validation","Data\\Filter\\Chọn giá trị cần lọc","Data\\Data Tools\\Remove Duplicates"],
        a:2, e:"Filter để lọc dữ liệu theo giá trị."},
      {m:"Excel", q:"Trong Excel 2010, chọn phát biểu đúng (về lọc nâng cao - Advanced Filter).",
        o:["Lọc dữ liệu nâng cao cho phép sao chép dữ liệu lọc được sang vùng khác","Lọc dữ liệu nâng cao chỉ lọc được dữ liệu nâng cao","Lọc dữ liệu nâng cao không cần điều kiện lọc","Lọc dữ liệu nâng cao chỉ cần 1 điều kiện"],
        a:0, e:"Advanced Filter có tùy chọn 'Copy to another location' — sao chép kết quả sang vùng khác."},
      {m:"Excel", q:"Trong Excel 2010, để đánh dấu vết những thay đổi chi tiết trong bảng tính, ta thao tác:",
        o:["Review\\Comments\\Show All Comments","Chọn tính năng List changes on a new sheet","Review\\Changes\\Accept/Reject Changes","Chọn tính năng Highlight changes on screen"],
        a:3, e:"Track Changes → 'Highlight changes on screen' để hiện vết thay đổi ngay trên bảng tính."},
      // ---------- MS PROJECT (11–20) ----------
      {m:"MS Project", q:"Khái niệm nào sau đây là khái niệm ĐÚNG về dự án? (⚠️ ảnh đề che câu 11 — tái dựng theo dạng chuẩn)",
        o:["Dự án là sự cố gắng nhằm tạo ra sản phẩm/dịch vụ trong thời gian KHÔNG giới hạn","Dự án là khối lượng công việc cần thực hiện nhằm tạo ra sản phẩm/dịch vụ nhất định trong giới hạn về quy mô, phạm vi, thời gian, chi phí, tài nguyên cho trước","Dự án là một chính sách kinh doanh dài hạn","Dự án là nhiệm vụ lặp đi lặp lại hằng ngày"],
        a:1, flag:true, e:"⚠️ Ảnh đề bị che câu 11 nên tái dựng. Định nghĩa đúng: tạo sản phẩm/dịch vụ trong GIỚI HẠN quy mô–thời gian–chi phí–tài nguyên."},
      {m:"MS Project", q:"Dự án trong MS Project 2010 có thể xuất thành tập tin nào sau đây:",
        o:["*.XPS","Tất cả đều đúng","*.PDF","*.MPP"],
        a:3, flag:true, e:"⚠️ Theo đáp án ngân hàng (Câu 339) là *.MPP. Lưu ý: thực tế Project còn xuất được PDF/XPS nên 'Tất cả đều đúng' cũng hợp lý — nên hỏi lại giảng viên."},
      {m:"MS Project", q:"Nguyên vật liệu thuộc vào loại nguồn lực nào?",
        o:["Work","Standard","Material","Cost"],
        a:2, e:"Nguyên vật liệu = Material (Work: người/máy; Cost: chi phí cố định)."},
      {m:"MS Project", q:"Cột Material Label trong Resource Sheet dùng để?",
        o:["Nhập giá trong giờ","Nhập cách tính chi phí","Nhập giá ngoài giờ","Nhập đơn vị đo (tính) cho nguồn lực vật tư"],
        a:3, e:"Material Label = đơn vị đo của nguồn lực vật tư (kg, cái, m³…)."},
      {m:"MS Project", q:"Đối với những dự án độc lập sử dụng chỉ tiêu B/C để đánh giá thì dự án được chấp nhận nếu:",
        o:["B/C = 1","B/C > 1","B/C < 1","B/C < 0"],
        a:1, e:"B/C > 1 (lợi ích lớn hơn chi phí) thì dự án được chấp nhận (ngân hàng Câu 372)."},
      {m:"MS Project", q:"Hãy chọn định nghĩa CHÍNH XÁC của rủi ro trong các ý sau đây?",
        o:["Rủi ro là vấn đề chưa xảy ra nhưng CHẮC CHẮN sẽ xảy ra làm ảnh hưởng mục tiêu dự án","Rủi ro là vấn đề thiên tai, bão lụt, tai nạn lao động có thể xảy ra với dự án","Rủi ro là vấn đề tiềm tàng CÓ KHẢ NĂNG xảy ra trong tương lai, ảnh hưởng đến mục tiêu, phạm vi, chất lượng, tài nguyên và tiến độ dự án","Rủi ro là vấn đề ĐÃ xảy ra làm ảnh hưởng xấu đến dự án"],
        a:2, e:"Rủi ro = sự kiện TIỀM TÀNG, CÓ KHẢ NĂNG xảy ra trong tương lai (chưa chắc chắn), ảnh hưởng đến dự án."},
      {m:"MS Project", q:"Đâu là các công việc chính trong quản lý dự án?",
        o:["Cung cấp chi phí và nguồn lực cho dự án","Lập kế hoạch, quản lý tiến độ, chi phí và nhân lực cho dự án","Cung cấp các thông tin liên quan đến dự án","Thực hiện công việc được phân công trong dự án"],
        a:1, e:"Quản lý dự án = lập kế hoạch + quản lý tiến độ + chi phí + nhân lực."},
      {m:"MS Project", q:"Trong Microsoft Project, loại lịch bắt đầu từ đêm thứ 2 đến sáng thứ 7, từ 23h đến 8h sáng và mỗi ngày nghỉ 1h gọi là:",
        o:["Night Shift","Standard","Day Shift","24 Hours"],
        a:0, e:"Làm ban đêm (23h–8h) = Night Shift."},
      {m:"MS Project", q:"Trong Microsoft Project, loại lịch KHÔNG có thời gian nghỉ gọi là:",
        o:["Over Time","Night Shift","Standard","24 Hours"],
        a:3, e:"24 Hours = làm liên tục, không có giờ nghỉ."},
      {m:"MS Project", q:"Đường găng là đường có độ dài:",
        o:["Trung bình từ sự kiện đầu đến sự kiện cuối","Ngắn nhất từ sự kiện đầu đến sự kiện cuối","Bằng tổng thời gian thực hiện các công việc trong dự án","Dài nhất từ sự kiện đầu đến sự kiện cuối"],
        a:3, e:"Đường găng (Critical Path) = đường DÀI NHẤT, quyết định thời gian hoàn thành dự án (ngân hàng Câu 389)."},
      // ---------- POWERPOINT (21–30) ----------
      {m:"PowerPoint", q:"PowerPoint 2010 có chế độ hiển thị nào?",
        o:["Tất cả A, B, C đều đúng","Slide Sorter","Normal","Notes Page"],
        a:0, e:"Normal, Slide Sorter, Notes Page (và Reading View) đều là chế độ hiển thị → tất cả đều đúng."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, muốn chèn một đoạn âm thanh hay phim vào Slide, ta dùng lệnh:",
        o:["Insert\\Diagram","Insert\\Component","Insert\\Media","Insert\\Comment"],
        a:2, e:"Insert\\Media để chèn âm thanh (Audio) / phim (Video)."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, để chia đoạn văn thành nhiều cột ta làm thao tác sau:",
        o:["Home\\Decrease List Level","Home\\Line Spacing","Home\\Add or Remove Columns","Home\\Increase List Level"],
        a:2, e:"Add or Remove Columns để chia văn bản thành nhiều cột."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, khi soạn thảo, tổ hợp phím Ctrl+I có tác dụng nào sau đây:",
        o:["In đậm văn bản","Gạch chân nội dung văn bản","Tạo chữ nghiêng","Tăng kích thước văn bản lên một số đơn vị"],
        a:2, e:"Ctrl+I = Italic = chữ nghiêng (Ctrl+B đậm, Ctrl+U gạch chân)."},
      {m:"PowerPoint", q:"Để bỏ một slide ra khỏi quá trình trình chiếu trong PowerPoint 2010, cách nào sau đây KHÔNG đúng:",
        o:["Kích chuột phải vào slide cần loại bỏ\\Delete Slide","Chọn slide\\Slide Show\\Hide Slide","Kích chuột trái vào slide rồi ấn phím Delete","Tại slide cần bỏ ấn phím Delete"],
        a:2, flag:true, e:"⚠️ Nên đối chiếu bản gốc. Kích chuột trái vào VÙNG nội dung slide rồi Delete sẽ xóa đối tượng chứ không bỏ slide; cách đúng là thao tác trên thumbnail (Delete Slide) hoặc Hide Slide."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, để dùng những Slide đã định dạng sẵn, ta thực hiện:",
        o:["Cả B và C đều đúng","Kích chọn File\\New\\tìm các Template","Kích chọn File\\Open\\tìm các Presentation có sẵn","Cả B và C đều sai"],
        a:0, flag:true, e:"⚠️ Nên đối chiếu bản gốc. Slide định dạng sẵn lấy từ Template (File\\New) hoặc mở Presentation có sẵn (File\\Open) → cả hai cách đều được."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, để ghi chú thông tin cần thiết vào slide và có thể xem trước, ta: (⚠️ ảnh đề nhòe — tái dựng)",
        o:["Dùng chế độ Normal, nhập ghi chú ở khung Notes (Click to add notes)","Không làm được","Chỉ xem được khi đang trình chiếu","Phải dùng phần mềm khác"],
        a:0, flag:true, e:"⚠️ Phương án trong ảnh đề bị nhòe/trùng lặp — tái dựng. Ghi chú nhập ở khung Notes (chế độ Normal hoặc Notes Page)."},
      {m:"PowerPoint", q:"Tạo hiệu ứng động cho 2 đối tượng A và B trong 1 slide; B đặt xuất hiện sau A là 5 giây (After Previous). Khi trình chiếu:",
        o:["Sau khi A xuất hiện, cứ 5 giây B lại xuất hiện 1 lần","Sau khi A xuất hiện, người dùng nhấp chuột thì B mới xuất hiện","B luôn xuất hiện sau A là 5 giây, bất chấp người dùng có nhấp chuột hay không","Khi A xuất hiện, nếu người dùng nhấp chuột thì 5 giây sau B mới xuất hiện"],
        a:2, e:"After Previous + Delay 5s = B tự động hiện 5 giây sau A, không cần nhấp chuột."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, để hiệu chỉnh cho TẤT CẢ các slide có cùng một nền mẫu, ta chọn chức năng nào sau đây:",
        o:["Design\\Themes\\Apply to All","View\\Color\\Apply to All","Design\\Color\\Apply to All","Design\\Background Style\\Chọn màu cần tô\\Apply to All"],
        a:3, flag:true, e:"⚠️ Nên đối chiếu bản gốc. 'Cùng một nền' (background) → Design\\Background Styles → Apply to All. Nếu đề hỏi 'cùng giao diện/chủ đề' thì là Themes."},
      {m:"PowerPoint", q:"Trong PowerPoint 2010, muốn chuyển màn hình trình chiếu đến slide CUỐI CÙNG của file đang trình chiếu, cách làm nào:",
        o:["Ấn nút Action Button: Beginning","Hyperlink\\Place in this document\\Last Slide","Ấn nút Action Button: End","Ấn phím Home"],
        a:1, flag:true, e:"⚠️ Nên đối chiếu bản gốc. Liên kết tới 'Last Slide' (Place in This Document) đưa tới slide cuối; phím End cũng tới slide cuối (Home tới slide đầu)."},
      // ---------- WORD (31–40) ----------
      {m:"Word", q:"Muốn cài chức năng tự động lưu văn bản trong Microsoft Word 2010, ta dùng:",
        o:["File\\Options\\Save","File\\Options\\Advanced","File\\Options\\Display","File\\Options\\Customize"],
        a:0, e:"Cài AutoRecover/AutoSave ở File\\Options\\Save."},
      {m:"Word", q:"Trong Word 2010, chữ \"Cộng hòa xã hội chủ nghĩa Việt Nam\" nhập bằng font Times New Roman (Unicode); để chuyển sang bảng mã khác (vd .VnTimes) mà chữ vẫn đúng, ta: (⚠️ ảnh nhòe — tái dựng)",
        o:["Đổi trực tiếp font là được","Word tự nhận biết và chuyển","Vào Format → Theme","Dùng phần mềm gõ tiếng Việt (ví dụ Unikey) để chuyển đổi mã"],
        a:3, flag:true, e:"⚠️ Câu trong ảnh bị nhòe — tái dựng. Đổi giữa các bảng mã (Unicode ↔ TCVN3/VNI) phải dùng chức năng chuyển mã của Unikey, không chỉ đổi font."},
      {m:"Word", q:"Trong Word 2010, khi dùng Save As sẽ cho kết quả nào?",
        o:["Để lưu văn bản đã có","Xóa văn bản","Lưu văn bản với tên (hoặc định dạng/vị trí) khác","Đổi tên văn bản"],
        a:2, e:"Save As = lưu thành một bản với tên/định dạng/vị trí khác."},
      {m:"Word", q:"Hiện nay, trong Word 2010 ở Việt Nam thường sử dụng bảng mã nào để gõ tiếng Việt:",
        o:["TCVN3 (ABC)","Unicode","VIQR","VNI Windows"],
        a:1, e:"Bảng mã phổ biến nhất hiện nay là Unicode."},
      {m:"Word", q:"Trong Word 2010, văn bản có 1 trường (field) thời gian; để cập nhật thời gian hiện tại cho trường, ta chọn:",
        o:["Edit Field","Numbering","Update Field","Toggle Field Codes"],
        a:2, e:"Update Field cập nhật lại giá trị field (Toggle Field Codes chỉ hiện/ẩn mã field)."},
      {m:"Word", q:"Trong Word 2010, để ngắt trang bắt buộc, ta có thể nhấn tổ hợp phím nào?",
        o:["Alt + Enter","Shift + Enter","Ctrl + Enter","Enter"],
        a:2, e:"Ctrl+Enter = ngắt trang (Page Break); Shift+Enter = ngắt dòng."},
      {m:"Word", q:"Để tạo ảnh nền (hình mờ) cho văn bản trong Word 2010, ta chọn:",
        o:["Design\\Effects","Design\\Themes","Design\\Watermark","Design\\Colors"],
        a:2, e:"Watermark tạo chữ/ảnh nền mờ phía sau văn bản."},
      {m:"Word", q:"Trong Microsoft Word 2010, thao tác Shift + Enter có chức năng gì:",
        o:["Nhập dữ liệu theo hàng dọc","Nhập dữ liệu theo hàng ngang","Ngắt dòng","Ngắt trang"],
        a:2, e:"Shift+Enter = ngắt dòng (xuống dòng trong cùng đoạn)."},
      {m:"Word", q:"Trong Word 2010, tổ hợp phím nào đưa con trỏ về ĐẦU văn bản: (⚠️ đề bài trong ảnh nhòe — tái dựng theo phương án)",
        o:["Ctrl + Home","Shift + Home","Alt + Home","Ctrl + Alt + Home"],
        a:0, flag:true, e:"⚠️ Đề bài trong ảnh bị nhòe — tái dựng. Ctrl+Home đưa con trỏ về đầu văn bản (Ctrl+End về cuối)."},
      {m:"Word", q:"Trong Word 2010, KHÔNG thể thực hiện được việc nào sau đây?",
        o:["Vẽ bảng biểu trong văn bản","Chèn ảnh vào trang văn bản","Kiểm tra lỗi chính tả Tiếng Việt","Sao chép một đoạn văn bản và dán nhiều lần liên tục"],
        a:2, e:"Word không có sẵn bộ kiểm tra chính tả Tiếng Việt (chỉ hỗ trợ một số ngôn ngữ khác)."}
    ]
  },

  "De01": {
    meta: "Đề: De 1 · Bộ đề thi thử (TracNghiem) · 40 câu",
    minutes: 40,
    questions: [
      // ---------- WORD (1–10) ----------

  "MS Project": { label:"📅 MS Project 2010", questions:[
    {q:"Chức năng Zoom out trong MS Project 2010 thực hiện:",

      e:"Zoom out = thu nhỏ nội dung hiển thị."},
    {q:"Dự án trong MS Project 2010 có thể xuất thành các tập tin nào sau đây:",
      o:["*.MPP","Tất cả đều đúng","*.PDF","*.XPS"], a:0,
      e:"Đáp án theo file tổng ôn: *.MPP (đuôi gốc của Project). Lưu ý: thực tế còn xuất được PDF/XPS."},
    {q:"Con người và máy móc thuộc loại nguồn lực nào?",

    {q:"Khi chọn cơ chế tính phí là 'Prorated', chi phí sẽ được tính vào lúc:",
      o:["Dùng đến đâu tính đến đó — chi phí rải đều trong quá trình sử dụng nguồn lực","Thời điểm bắt đầu sử dụng nguồn lực","Thời điểm kết thúc sử dụng nguồn lực","Không có cách chọn này khi tính phí"], a:0,

    {q:"Đâu là bộ 3 cách tính chi phí nguồn lực (Accrue At) trong MS Project?",

    {q:"Phương án nào dưới đây thuộc các nguyên tắc cơ bản khi lựa chọn địa bàn triển khai dự án:",
      o:["Tất cả phương án dưới đây đều đúng","Gần nguồn nguyên liệu và nơi tiêu thụ","Đảm bảo an ninh, an toàn trong kinh doanh và trật tự xã hội","Chống ô nhiễm môi trường"], a:0,

    {q:"Nhận định nào dưới đây là SAI đối với sơ đồ PERT:",

/* ===================== TÀI KHOẢN ĐĂNG NHẬP ===================== */
/* 👉 Sửa/thêm tài khoản ở đây. name = tên hiển thị (thí sinh). */
const USERS = [
  { u:"hocvien", p:"123456", name:"Học viên" }
  // , { u:"kido", p:"matkhau", name:"Kí Đặng" }
];
let currentUser = null;

function doLogin(e){
  if(e) e.preventDefault();
  const u=document.getElementById("inpUser").value.trim();
  const p=document.getElementById("inpPass").value;
  const acc=USERS.find(x=>x.u.toLowerCase()===u.toLowerCase() && x.p===p);
  if(!acc){ document.getElementById("loginErr").style.display="block"; return; }
  currentUser=acc;
  try{ sessionStorage.setItem("ttn_user", acc.u); }catch(err){}
  enterApp();
}
function enterApp(){
  document.getElementById("loginErr").style.display="none";
  document.getElementById("loginView").classList.add("hide");
  document.getElementById("topbar").classList.remove("hide");
  document.getElementById("userName").textContent=currentUser.name;
  loadExam(Object.keys(EXAMS)[0]);
}
function doLogout(){
  if(!confirm("Đăng xuất khỏi tài khoản này?")) return;
  if(timerId) clearInterval(timerId);
  currentUser=null;
  try{ sessionStorage.removeItem("ttn_user"); }catch(err){}
  ["topbar","startView","examView","resultView"].forEach(id=>document.getElementById(id).classList.add("hide"));
  document.getElementById("loginView").classList.remove("hide");
  document.getElementById("inpPass").value="";
}

/* ===== Lịch sử điểm (lưu theo từng tài khoản trên trình duyệt) ===== */
function histKey(){ return "ttn_hist_"+currentUser.u; }
function getHistory(){ try{ return JSON.parse(localStorage.getItem(histKey()))||[]; }catch(e){ return []; } }
function saveScore(rec){ try{ const h=getHistory(); h.unshift(rec); localStorage.setItem(histKey(), JSON.stringify(h.slice(0,50))); }catch(e){} }
function historyHTML(){
  const h=getHistory();
  let inner;
  if(!h.length) inner=`<div class="hist-empty">Chưa có lần thi nào. Hãy bắt đầu thi!</div>`;
  else{
    inner=`<table class="histtable"><thead><tr><th>Lần</th><th>Đề</th><th>Điểm</th><th>Đúng</th><th>Thời gian nộp</th></tr></thead><tbody>`;
    h.forEach((r,i)=>{ inner+=`<tr><td>${h.length-i}</td><td>${r.exam}</td><td style="font-weight:700;color:${r.score>=5?'var(--ok)':'var(--bad)'}">${r.score.toFixed(1)}</td><td>${r.correct}/${r.total}</td><td>${r.date}</td></tr>`; });
    inner+=`</tbody></table>`;
  }
  return `<div class="histbox"><h3>📊 Lịch sử điểm của ${currentUser.name}</h3>${inner}</div>`;
}

/* ===================== ENGINE ===================== */
let exam, curKey=null, cur=0, answers=[], submitted=false, timeLeft=0, timerId=null;
function modClass(m){ return m==="Excel"?"m-excel":m==="MS Project"?"m-project":m==="PowerPoint"?"m-ppt":"m-word"; }

/* Chọn/đổi đề → về MÀN HÌNH BẮT ĐẦU (đồng hồ CHƯA chạy) */
function loadExam(key){
  curKey = key; exam = EXAMS[key];
  cur=0; submitted=false; answers = new Array(exam.questions.length).fill(null);
  if(timerId) clearInterval(timerId);
  document.getElementById("examMeta").textContent = exam.meta;
  const t=document.getElementById("timer");
  t.textContent = String(exam.minutes).padStart(2,"0")+":00"; t.classList.remove("low");
  document.getElementById("examView").classList.add("hide");
  document.getElementById("resultView").classList.add("hide");
  document.getElementById("startView").classList.remove("hide");
  document.getElementById("backBtn").classList.add("hide");
  renderStart(); window.scrollTo(0,0);
}

function renderStart(){
  const total=exam.questions.length;
  const mods=exam.questions.reduce((a,q)=>{a[q.m]=(a[q.m]||0)+1;return a;},{});
  const modstr=Object.entries(mods).map(([k,v])=>`<span class="chip ${modClass(k)}">${k} · ${v}</span>`).join("");
  document.getElementById("startBox").innerHTML=`
    <div class="start-hero">📝</div>
    <h2>Sẵn sàng thi thử?</h2>
    <div class="start-meta">${exam.meta}</div>
    <div class="start-stats">
      <div><b>${total}</b><span>câu hỏi</span></div>
      <div><b>${exam.minutes}'</b><span>thời gian</span></div>
      <div><b>5.0</b><span>điểm đạt</span></div>
    </div>
    <div class="start-mods">${modstr}</div>
    <button class="startbtn" onclick="startExam()"><span class="play">▶</span> Bắt đầu thi</button>
    <div class="start-note">⏱️ Đồng hồ chỉ bắt đầu đếm khi bạn bấm "Bắt đầu thi". Hết giờ sẽ tự động nộp bài.</div>
    ${historyHTML()}`;
}

/* Bấm Bắt đầu thi → vào đề, đồng hồ chạy */
function startExam(){
  document.getElementById("startView").classList.add("hide");
  document.getElementById("examView").classList.remove("hide");
  document.getElementById("backBtn").classList.remove("hide");
  buildGrid(); renderQ(); startTimer(exam.minutes*60); window.scrollTo(0,0);
}

/* Thoát đề khi đang thi → quay lại màn hình bắt đầu (không lưu đáp án đang làm) */
function backToStart(){
  if(!confirm("Thoát đề và quay lại màn hình bắt đầu? Các đáp án đang làm sẽ KHÔNG được lưu.")) return;
  loadExam(curKey);
}

/* ===================== KHÔNG GIAN ÔN TẬP ===================== */
let studyKey=null, studyIdx=0, studyReveal=false;

function switchMode(m){
  document.getElementById("tabExam").classList.toggle("active", m==="exam");
  document.getElementById("tabStudy").classList.toggle("active", m==="study");
  if(m==="study"){
    if(timerId) clearInterval(timerId);
    document.getElementById("examControls").classList.add("hide");
    ["startView","examView","resultView"].forEach(id=>document.getElementById(id).classList.add("hide"));
    document.getElementById("backBtn").classList.add("hide");
    document.getElementById("examMeta").textContent="Chế độ Ôn tập — học theo từng module";
    document.getElementById("studyView").classList.remove("hide");
    const def = studyKey || Object.keys(BANK).find(k=>BANK[k].questions.length) || Object.keys(BANK)[0];
    loadStudy(def);
  }else{
    document.getElementById("studyView").classList.add("hide");
    document.getElementById("examControls").classList.remove("hide");
    loadExam(curKey);   // về màn hình bắt đầu của Thi thử
  }
  window.scrollTo(0,0);
}

function loadStudy(key){ studyKey=key; studyIdx=0; studyReveal=false; renderStudyView(); window.scrollTo(0,0); }
function studyGo(d){ const n=BANK[studyKey].questions.length; studyIdx=Math.min(n-1,Math.max(0,studyIdx+d)); studyReveal=false; renderStudyView(); }
function toggleReveal(){ studyReveal=!studyReveal; renderStudyView(); }

function renderStudyView(){
  const keys=["A","B","C","D"];
  let mods=`<div class="study-mods">`;
  Object.keys(BANK).forEach(k=>{
    const n=BANK[k].questions.length;
    mods+=`<button class="modtab ${modClass(k)} ${k===studyKey?'active':''}" onclick="loadStudy('${k}')">${BANK[k].label}<small>${n?n+' câu':'sắp có'}</small></button>`;
  });
  mods+=`</div>`;
  const mod=BANK[studyKey], qs=mod.questions;
  let body;
  if(!qs.length){
    body=`<div class="study-empty">📚 Module <b>${mod.label}</b> đang được cập nhật dần từ file tổng ôn.<br>Hiện đã có: <b>PowerPoint</b>. Các module khác sẽ bổ sung tiếp.</div>`;
  }else{
    const q=qs[studyIdx]; let opts="";
    q.o.forEach((o,j)=>{ const ok=studyReveal&&j===q.a; opts+=`<div class="sopt ${ok?'correct':''}"><b>${keys[j]}.</b> ${o}${ok?' ✅':''}</div>`; });
    const pct=Math.round((studyIdx+1)/qs.length*100);
    body=`<div class="study-card">
      <div class="qhead"><span class="qnum">Câu ${studyIdx+1}/${qs.length}</span><span class="qmod ${modClass(studyKey)}">${mod.label}</span></div>
      <div class="study-progress"><i style="width:${pct}%"></i></div>
      <div class="qtext">${q.q}</div>
      <div class="opts-study">${opts}</div>
      ${studyReveal?`<div class="expl" style="margin-top:14px">💡 ${q.e||''}</div>`:''}
      <div class="study-actions"><button class="reveal-big ${studyReveal?'hidden':''}" onclick="toggleReveal()">${studyReveal?'🙈 Ẩn đáp án':'👁 Hiện đáp án'}</button></div>
      <div class="navrow">
        <button onclick="studyGo(-1)" ${studyIdx===0?'disabled':''}>← Câu trước</button>
        <button onclick="studyGo(1)" ${studyIdx===qs.length-1?'disabled':''}>Câu sau →</button>
      </div>
    </div>`;
  }
  document.getElementById("studyView").innerHTML=mods+body;
}

function buildGrid(){
  const g=document.getElementById("grid"); g.innerHTML="";
  exam.questions.forEach((_,i)=>{
    const b=document.createElement("button");
    b.className="qbtn"; b.textContent=i+1; b.onclick=()=>{cur=i;renderQ();};
    g.appendChild(b);
  });
  refreshGrid();
}
function refreshGrid(){
  const btns=document.querySelectorAll("#grid .qbtn");
  btns.forEach((b,i)=>{
    b.className="qbtn";
    if(submitted){ b.classList.add(answers[i]===exam.questions[i].a?"correct":"wrong"); }
    else if(answers[i]!==null) b.classList.add("answered");
    if(i===cur && !submitted) b.classList.add("current");
  });
  const done=answers.filter(x=>x!==null).length;
  document.getElementById("progress").textContent=`Đã làm ${done}/${exam.questions.length}`;
}

function renderQ(){
  const q=exam.questions[cur];
  const keys=["A","B","C","D"];
  let html=`<div class="qhead"><span class="qnum">Câu ${cur+1}/${exam.questions.length}</span><span class="qmod ${modClass(q.m)}">${q.m}</span></div>
    <div class="qtext">${q.q}</div><div class="opts">`;
  q.o.forEach((opt,i)=>{
    const sel = answers[cur]===i ? "sel":"";
    html+=`<label class="opt ${sel}"><input type="radio" name="opt" ${answers[cur]===i?"checked":""} onclick="choose(${i})">
      <span class="key">${keys[i]}.</span><span>${opt}</span></label>`;
  });
  html+=`</div><div class="navrow">
      <button onclick="go(-1)" ${cur===0?"disabled":""}>← Câu trước</button>
      <button onclick="go(1)" ${cur===exam.questions.length-1?"disabled":""}>Câu sau →</button>
    </div>`;
  document.getElementById("qcard").innerHTML=html;
  refreshGrid();
}
function choose(i){ answers[cur]=i; renderQ(); }
function go(d){ cur=Math.min(exam.questions.length-1,Math.max(0,cur+d)); renderQ(); }

function startTimer(sec){
  timeLeft=sec; if(timerId) clearInterval(timerId);
  updateTimer();
  timerId=setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0){clearInterval(timerId); submitExam(true);} },1000);
}
function updateTimer(){
  const m=String(Math.floor(timeLeft/60)).padStart(2,"0"), s=String(timeLeft%60).padStart(2,"0");
  const t=document.getElementById("timer"); t.textContent=`${m}:${s}`;
  t.classList.toggle("low", timeLeft<=120);
}

function submitExam(auto=false){
  if(!auto){
    const done=answers.filter(x=>x!==null).length;
    const blank=exam.questions.length-done;
    let msg = blank>0 ? `Bạn còn ${blank} câu CHƯA làm. Vẫn nộp bài?` : "Nộp bài và chấm điểm?";
    if(!confirm(msg)) return;
  }
  submitted=true; if(timerId) clearInterval(timerId);
  document.getElementById("backBtn").classList.add("hide");
  const total=exam.questions.length;
  let correct=0; answers.forEach((a,i)=>{ if(a===exam.questions[i].a) correct++; });
  const score=Math.round(correct/total*100)/10;     // /10
  const pass=score>=5;
  const usedSec=exam.minutes*60-timeLeft;
  const um=String(Math.floor(usedSec/60)).padStart(2,"0"), us=String(usedSec%60).padStart(2,"0");

  // lưu lịch sử điểm cho tài khoản hiện tại
  const now=new Date();
  const dateStr=`${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  saveScore({exam:curKey, score, correct, total, date:dateStr});

  document.getElementById("examView").classList.add("hide");
  document.getElementById("resultView").classList.remove("hide");
  window.scrollTo(0,0);

  document.getElementById("resultBox").innerHTML=`
    <div class="statline" style="font-size:15px;color:var(--pp-dark)">Thí sinh: <b>${currentUser.name}</b></div>
    <div class="scorebig ${pass?'pass':'fail'}">${score.toFixed(1)}<span style="font-size:24px;color:#999">/10</span></div>
    <div class="verdict ${pass?'pass':'fail'}">${pass?'✅ ĐẠT (≥ 5.0)':'❌ CHƯA ĐẠT (< 5.0)'}</div>
    <div class="statline">Đúng <b>${correct}/${total}</b> câu · Sai/bỏ trống ${total-correct} câu</div>
    <div class="statline">Thời gian làm bài: ${um}:${us}</div>
    <div class="statline" style="margin-top:8px;font-size:13px">⚠️ Lưu ý: các câu có nhãn vàng bên dưới là đáp án Claude xác minh từ ngân hàng nhưng <b>nên đối chiếu lại bản gốc</b>.</div>
    <div class="actions">
      <button class="btn-primary" onclick="loadExam(curKey)">🔄 Thi lại đề này</button>
      <button class="btn-ghost" onclick="window.print()">🖨️ In / Lưu PDF kết quả</button>
    </div>`;

  buildReview();
}

/* ===== XEM LẠI: chỉ hiện câu SAI/bỏ trống, cho CHỌN LẠI đến khi đúng ===== */
let resolved=new Set(), retryList=[];
function buildReview(){
  const keys=["A","B","C","D"];
  resolved=new Set();
  retryList=exam.questions.map((q,i)=>i).filter(i=>answers[i]!==exam.questions[i].a);
  const box=document.getElementById("reviewList");
  if(retryList.length===0){
    box.innerHTML=`<div class="retry-head" style="color:var(--ok)">🎉 Tuyệt vời! Bạn làm ĐÚNG HẾT — không có câu nào cần ôn lại.</div>`;
    return;
  }
  let rev=`<div class="retry-head" id="retryHead"></div>
    <p style="color:var(--muted);font-size:13.5px;margin:0 0 12px">Chỉ hiện các câu bạn làm <b>SAI / bỏ trống</b> (câu đúng đã được bỏ qua). Hãy <b>chọn lại</b> cho đến khi đúng — hoặc bấm "xem đáp án".</p>`;
  retryList.forEach(i=>{
    const q=exam.questions[i], ua=answers[i];
    rev+=`<div class="rev" id="rev-${i}"><div class="rh"><span class="qnum">Câu ${i+1}</span><span class="qmod ${modClass(q.m)}">${q.m}</span>
      <span class="badge bad" id="revbadge-${i}">${ua===null?'⬜ Bỏ trống — chọn lại':'✗ Đã sai — chọn lại'}</span></div>
      <div style="font-weight:600;margin-bottom:8px">${q.q}</div><div>`;
    q.o.forEach((opt,j)=>{
      const wrongPick=(j===ua && ua!==q.a);
      rev+=`<button class="ropt ${wrongPick?'wrong':''}" id="ropt-${i}-${j}" ${wrongPick?'disabled':''} onclick="reviewPick(${i},${j})"><b>${keys[j]}.</b> ${opt}${wrongPick?' ❌ (bạn đã chọn)':''}</button>`;
    });
    rev+=`</div><button class="reveal" id="reveal-${i}" onclick="revealAnswer(${i})">💡 Chịu thua — xem đáp án &amp; giải thích</button>
      <div class="expl ${q.flag?'flag':''} hide" id="rexpl-${i}">💡 ${q.e}</div></div>`;
  });
  box.innerHTML=rev;
  updateRetryHead();
}
function updateRetryHead(){
  const h=document.getElementById("retryHead"); if(!h) return;
  const left=retryList.length-resolved.size;
  if(left===0){ h.style.color="var(--ok)"; h.innerHTML=`🎉 Đã ôn lại xong tất cả ${retryList.length} câu sai!`; }
  else { h.style.color=""; h.innerHTML=`📋 Cần làm lại: còn <b>${left}/${retryList.length}</b> câu`; }
}
function reviewPick(i,j){
  if(resolved.has(i)) return;
  const q=exam.questions[i], btn=document.getElementById(`ropt-${i}-${j}`);
  if(j===q.a){
    btn.className="ropt correct"; btn.innerHTML+=" ✅";
    q.o.forEach((_,k)=>{ document.getElementById(`ropt-${i}-${k}`).disabled=true; });
    const bd=document.getElementById(`revbadge-${i}`); bd.className="badge ok"; bd.textContent="✓ Làm lại ĐÚNG";
    document.getElementById(`rexpl-${i}`).classList.remove("hide");
    document.getElementById(`reveal-${i}`).classList.add("hide");
    resolved.add(i); updateRetryHead();
  } else {
    btn.className="ropt wrong"; btn.disabled=true;   // chọn sai → gạch bỏ, thử tiếp
  }
}
function revealAnswer(i){
  if(resolved.has(i)) return;
  const q=exam.questions[i];
  const cb=document.getElementById(`ropt-${i}-${q.a}`); cb.className="ropt correct"; cb.innerHTML+=" ✅ (đáp án đúng)";
  q.o.forEach((_,k)=>{ document.getElementById(`ropt-${i}-${k}`).disabled=true; });
  const bd=document.getElementById(`revbadge-${i}`); bd.className="badge"; bd.style.background="#9a6b00"; bd.style.color="#fff"; bd.textContent="👁 Đã xem đáp án";
  document.getElementById(`rexpl-${i}`).classList.remove("hide");
  document.getElementById(`reveal-${i}`).classList.add("hide");
  resolved.add(i); updateRetryHead();
}

/* init: nạp danh sách đề + kiểm tra phiên đăng nhập */
(function(){
  const sel=document.getElementById("examSel");
  Object.keys(EXAMS).forEach(k=>{ const o=document.createElement("option"); o.value=k; o.textContent="Đề "+k; sel.appendChild(o); });
  let saved=null; try{ saved=sessionStorage.getItem("ttn_user"); }catch(e){}
  const acc=saved && USERS.find(x=>x.u===saved);
  if(acc){ currentUser=acc; enterApp(); }            // còn phiên → vào thẳng
  else { document.getElementById("loginView").classList.remove("hide"); }  // chưa → hiện đăng nhập
})();
</script>
